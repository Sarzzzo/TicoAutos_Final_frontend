<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos</title>
    <link rel="stylesheet" href="./css/auth.css">
</head>

<body>
    <!-- 
        Cargamos Vue 3 y vue3-sfc-loader vía CDN 
        Esto nos permite usar archivos .vue sin herramientas de construcción como Webpack o Vite.
    -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>

    <!-- El "app" es el div donde Vue va a inyectar toda la reactividad -->
    <div class="auth-container" id="app">
        <!-- LEFT: BRANDING SIDEBAR -->
        <div class="auth-sidebar" style="background-image: url('./assets/img/auth-brand.png');">
            <div class="sidebar-overlay"></div>
            <div class="sidebar-content">
                <img src="./assets/img/ImageProy.png" alt="TicoAutos Logo" class="sidebar-logo">
                <div class="sidebar-text">
                    <h2>Impulsando tus sueños</h2>
                    <p>La red automotriz más prestigiosa de Costa Rica. Encuentra, vende y conecta con seguridad.</p>
                </div>
                <div class="sidebar-footer">
                </div>
            </div>
        </div>

        <!-- RIGHT: FORM SIDE -->
        <div class="auth-main">
            <!-- 
                Aquí se inyecta el componente AuthApp.vue que creamos.
                Vue reemplazará esta etiqueta con el HTML de AuthApp.vue
            -->
            <auth-app></auth-app>
        </div>
    </div>

    <!-- Script de inicialización de Vue y carga del componente -->
    <script>
        // Configuración para que el loader cargue archivos .vue del sistema
        const options = {
            moduleCache: {
                vue: Vue
            },
            async getFile(url) {
                const res = await fetch(url);
                if (!res.ok) throw Object.assign(new Error(res.statusText + ' ' + url), { res });
                return {
                    getContentData: asBinary => asBinary ? res.arrayBuffer() : res.text(),
                }
            },
            addStyle(textContent) {
                const style = Object.assign(document.createElement('style'), { textContent });
                const ref = document.head.getElementsByTagName('style')[0] || null;
                document.head.insertBefore(style, ref);
            },
        };

        const { loadModule } = window['vue3-sfc-loader'];

        // Creamos la aplicación central de Vue
        const app = Vue.createApp({
            components: {
                // Definimos que la etiqueta <auth-app> cargue el archivo AuthMain.vue
                'auth-app': Vue.defineAsyncComponent(() => loadModule('./vue-components/auth/AuthMain.vue', options))
            }
        });

        // Montamos la aplicación de Vue en el div #app
        app.mount('#app');
    </script>
</body>

</html>
