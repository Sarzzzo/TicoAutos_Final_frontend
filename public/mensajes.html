<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicoAutos - Mensajes</title>
    <link rel="stylesheet" href="./css/messages.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="navbar-logo">
            <img src="./assets/img/ImageProy.png" alt="Logo TicoAutos" class="logo-img">
        </a>
        <div class="navbar-right">
            <button class="btn-secondary" onclick="window.location.href='dashboard.html'">Volver al Catalogo</button>
        </div>
    </nav>

    <!-- Contenedor principal de Vue -->
    <div id="app">
        <!-- Nuestro componente Vue -->
        <messages-app></messages-app>
    </div>

    <!-- Scripts para cargar Vue y nuestro archivo .vue (SFC loader) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader/dist/vue3-sfc-loader.js"></script>

    <script>
        const options = {
            moduleCache: { vue: Vue },
            async getFile(url) {
                const res = await fetch(url);
                if (!res.ok) throw Object.assign(new Error(res.statusText + ' ' + url), { res });
                return { getContentData: asBinary => asBinary ? res.arrayBuffer() : res.text() };
            },
            addStyle(textContent) {
                const style = Object.assign(document.createElement('style'), { textContent });
                const ref = document.head.getElementsByTagName('style')[0] || null;
                document.head.insertBefore(style, ref);
            },
        };

        const { loadModule } = window['vue3-sfc-loader'];

        const app = Vue.createApp({
            components: {
                'messages-app': Vue.defineAsyncComponent(() => loadModule('./vue-components/chat/MessagesMain.vue', options))
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
